const ALIEN_BUILDERS = [buildSaucer, buildMothership, buildFighter, buildOrb];
const HUMAN_BUILDERS = [buildRocket, buildShuttle, buildCapsule];

function spawnCraft(){
  const human = Math.random() < 0.3;
  const spec = cPick(human ? HUMAN_BUILDERS : ALIEN_BUILDERS)();
  const g = spec.group; g.frustumCulled = false; scene.add(g);
  const n = cUnit(), t = Math.abs(n.y) > 0.9 ? new THREE.Vector3(1,0,0) : _YUP;
  const u = new THREE.Vector3().crossVectors(n,t).normalize();
  const v = new THREE.Vector3().crossVectors(n,u).normalize();
  const sh = {
    group:g, beam:spec.beam, flame:spec.flame, orient:spec.orient, baseSize:spec.baseSize,
    spinRate:spec.spin||0, spinPhase:Math.random()*6.283, faction: human?'human':'alien',
    // Aliens hug Earth in a low, dramatic orbit; human craft sit a bit higher.
    u, v, orbitR: human ? cRand(2.2,3.6) : cRand(1.35,2.1), angle:Math.random()*6.283,
    angSpeed:cRand(0.7,1.5)*(Math.random()<0.5?1:-1), rounds:1+((Math.random()*5)|0),
    fromOff:new THREE.Vector3(), prevPos:null, landDir:new THREE.Vector3(),
    leaveDir:new THREE.Vector3(), leaveDist:0, landTarget:null, afterLand:'leave',
    arriveDir:cUnit(), arriveDist:cRand(45,90), dwell:0, dur:cRand(4,7),
  };
  if (human){ cUnit(sh.landDir); sh.state='launching'; sh.dur=cRand(4,7); }
  else      { sh.state='arriving'; }
  sh.t = 0;
  craft.push(sh);
}

function placeCraft(sh, pos, refDir, dt, mode){
  const g = sh.group;
  const up = _sv[9].copy(refDir.lengthSq()>1e-12 ? refDir : _YUP).normalize();
  if (mode === 'hover'){
    sh.spinPhase += sh.spinRate*dt; g.up.set(0,1,0);
    g.quaternion.setFromUnitVectors(_YUP, up); g.rotateY(sh.spinPhase); g.position.copy(pos);
  } else if (mode === 'fly'){
    let fwd = _sv[6];
    if (sh.prevPos && _sv[6].copy(pos).sub(sh.prevPos).lengthSq() > 1e-16) fwd.normalize(); else fwd.copy(up);
    g.up.copy(up); g.position.copy(pos); g.lookAt(_sv[5].copy(pos).add(fwd));
  } else { // 'stand' : nose (−Z) points along refDir (radial up)
    let s = _sv[7].crossVectors(up, _YUP); if (s.lengthSq() < 1e-9) s.set(1,0,0);
    g.up.copy(s.normalize()); g.position.copy(pos); g.lookAt(_sv[5].copy(pos).add(up));
  }
  if (!sh.prevPos) sh.prevPos = new THREE.Vector3();
  sh.prevPos.copy(pos);
}
function craftFx(sh, thrust, beamOn){ if (sh.flame) sh.flame.visible = thrust; if (sh.beam) sh.beam.visible = beamOn; }

function updateCraft(dt, earthPos, earthR, moonPos, moonR){
  const TWO_PI = Math.PI*2;
  for (let i = craft.length-1; i >= 0; i--){
    const sh = craft[i]; sh.t += dt;
    sh.group.scale.setScalar(sh.baseSize * earthR);
    const orbitRad = sh.orbitR * earthR;
    const orbitPos = ang => _sv[0].copy(earthPos).addScaledVector(sh.u, orbitRad*Math.cos(ang)).addScaledVector(sh.v, orbitRad*Math.sin(ang));

    if (sh.state === 'launching'){
      const start  = _sv[1].copy(earthPos).addScaledVector(sh.landDir, earthR);
      const target = _sv[2].copy(orbitPos(sh.angle));
      const p = Math.min(1, sh.t/sh.dur), e = p*p;
      const pos = _sv[3].copy(start).lerp(target, e);
      placeCraft(sh, pos, _sv[4].copy(pos).sub(earthPos), dt, 'fly'); craftFx(sh, true, false);
      if (p >= 1){ sh.state='orbiting'; sh.t=0; }
    }
    else if (sh.state === 'arriving'){
      const start  = _sv[1].copy(earthPos).addScaledVector(sh.arriveDir, sh.arriveDist*earthR);
      const target = _sv[2].copy(orbitPos(sh.angle));
      const p = Math.min(1, sh.t/sh.dur), e = p*p*(3-2*p);
      const pos = _sv[3].copy(start).lerp(target, e);
      placeCraft(sh, pos, _sv[4].copy(pos).sub(earthPos), dt, sh.orient); craftFx(sh, false, false);
      if (p >= 1){ sh.state='orbiting'; sh.t=0; }
    }
    else if (sh.state === 'orbiting'){
      sh.angle += sh.angSpeed*dt;
      const pos = orbitPos(sh.angle);
      placeCraft(sh, pos, _sv[4].copy(pos).sub(earthPos), dt, sh.orient); craftFx(sh, false, false);
      if (Math.abs(sh.angSpeed)*sh.t >= sh.rounds*TWO_PI){
        let land = false, onMoon = false;
        if (sh.faction === 'human'){
          const r = Math.random();
          if (r < 0.45){ land=true; onMoon=false; sh.afterLand='despawn'; }
          else if (r < 0.78 && earthMoon){ land=true; onMoon=true; sh.afterLand='leave'; }
        } else {
          if (Math.random() < 0.55){ land=true; onMoon = earthMoon && Math.random()<0.5; sh.afterLand='leave'; }
        }
        if (land){
          sh.landTarget = onMoon ? 'moon' : 'earth'; cUnit(sh.landDir);
          sh.dur = cRand(3,5); sh.dwell = cRand(6,16);
          const Ct = onMoon ? moonPos : earthPos; sh.fromOff.copy(pos).sub(Ct);
          sh.state='descending'; sh.t=0;
        } else {
          cUnit(sh.leaveDir); sh.leaveDist = cRand(60,110); sh.dur = cRand(5,8);
          sh.fromOff.copy(pos).sub(earthPos); sh.state='leaving'; sh.t=0;
        }
      }
    }
    else if (sh.state === 'descending'){
      const onMoon = sh.landTarget === 'moon';
      const Ct = onMoon ? moonPos : earthPos, Rt = onMoon ? moonR : earthR;
      const start = _sv[1].copy(Ct).add(sh.fromOff);
      const surf  = _sv[2].copy(Ct).addScaledVector(sh.landDir, Rt + 0.04*earthR);
      const p = Math.min(1, sh.t/sh.dur), e = p*p*(3-2*p);
      const pos = _sv[3].copy(start).lerp(surf, e);
      const mode = sh.faction === 'human' ? 'stand' : 'hover';
      placeCraft(sh, pos, sh.landDir, dt, mode);
      craftFx(sh, sh.faction === 'human', sh.faction === 'alien');
      if (p >= 1){ sh.state='landed'; sh.t=0; }
    }
    else if (sh.state === 'landed'){
      const onMoon = sh.landTarget === 'moon';
      const Ct = onMoon ? moonPos : earthPos, Rt = onMoon ? moonR : earthR;
      const pos = _sv[2].copy(Ct).addScaledVector(sh.landDir, Rt + 0.04*earthR);
      placeCraft(sh, pos, sh.landDir, dt, sh.faction === 'human' ? 'stand' : 'hover');
      craftFx(sh, false, sh.faction === 'alien');
      if (sh.t >= sh.dwell){
        if (sh.afterLand === 'despawn'){ disposeCraft(sh, i); continue; }
        sh.leaveDir.copy(sh.landDir); sh.leaveDist = cRand(60,110); sh.dur = cRand(5,8);
        sh.fromOff.copy(pos).sub(earthPos); sh.state='leaving'; sh.t=0;
      }
    }
    else if (sh.state === 'leaving'){
      const start  = _sv[1].copy(earthPos).add(sh.fromOff);
      const target = _sv[2].copy(earthPos).addScaledVector(sh.leaveDir, sh.leaveDist*earthR);
      const p = Math.min(1, sh.t/sh.dur), e = p*p;
      const pos = _sv[3].copy(start).lerp(target, e);
      placeCraft(sh, pos, _sv[4].copy(pos).sub(earthPos), dt, sh.orient);
      craftFx(sh, sh.faction === 'human', false);
      if (p >= 1){ disposeCraft(sh, i); }
    }
  }
}
function disposeCraft(sh, i){
  scene.remove(sh.group);
  sh.group.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
  craft.splice(i, 1);
}

const trafficRange = document.getElementById('trafficRange');
const elTrafficV   = document.getElementById('trafficV');
trafficRange.addEventListener('input', () => {
  trafficIdx = parseInt(trafficRange.value, 10);
  elTrafficV.textContent = TRAFFIC_LABELS[trafficIdx];
});
elTrafficV.textContent = TRAFFIC_LABELS[trafficIdx];

// ============================================================================
// Main loop
// ============================================================================
let last = performance.now();
const SUBSTEPS_BASE = 4;  // physics substeps per frame at 1 day/s

function fmtKm(m){
  const km = m / 1000;
  if (km > 1e9) return (km/1e9).toFixed(2)+' Gkm';
  if (km > 1e6) return (km/1e6).toFixed(2)+' Mkm';
  return km.toFixed(0)+' km';
}

function loop(now){
  const dtReal = Math.min(0.05, (now - last)/1000);
  last = now;

  if (!paused){
    const simDeltaSec = dtReal * daysPerSec * DAY;
    // adapt substeps to scale — keep per-step time small relative to inner-planet periods
    const substeps = Math.max(1, Math.ceil(SUBSTEPS_BASE * Math.sqrt(daysPerSec)));
    const dt = simDeltaSec / substeps;
    for (let s=0; s<substeps; s++) step(bodies, dt);
    simSeconds += simDeltaSec;
    spinSeconds += dtReal * spinDaysPerSec * DAY;   // independent axial-rotation clock
    elDT.textContent = dt.toExponential(2) + ' s';
  }

  // Update body positions from the integrator.
  for (let i=0;i<bodies.length;i++){
    const b = bodies[i];
    meshes[i].position.set(b.pos.x * SCENE_SCALE, b.pos.y * SCENE_SCALE, b.pos.z * SCENE_SCALE);
  }

  // Keep each planet's drawn orbit anchored to the Sun, which is its focus. The
  // N-body Sun drifts off the origin over time (the system has non-zero net
  // momentum and the Sun wobbles from Jupiter's pull) and carries the planets
  // with it, so a static origin-centred ellipse slowly falls off the body.
  // Translating the lines to the Sun re-aligns each ellipse's focus with its body.
  for (const line of orbitLines) line.position.copy(meshes[0].position);

  // Slow Sun rotation — the real Sun's equator rotates ~25 days/turn.
  meshes[0].rotation.y = (spinSeconds / (25 * DAY)) * Math.PI * 2;

  // Earth: axial tilt (23.44°) + one spin per day, plus lighting uniforms.
  {
    const em = meshes[earthState.index];
    const spin = (spinSeconds / DAY) * Math.PI * 2;
    earthState.spinQuat.setFromAxisAngle(earthState.spinAxis, spin);
    em.quaternion.copy(earthState.tiltQuat).multiply(earthState.spinQuat);
    // Sun direction (earth → sun) and camera position, mutated in place so the
    // Earth/cloud/atmosphere shaders all pick up the new values.
    earthSunDir.copy(meshes[0].position).sub(em.position).normalize();
    earthCamPos.copy(camera.position);
    // Atmosphere needs the planet centre + world radius for the impact-parameter math.
    earthState.atmoMat.uniforms.earthCenter.value.copy(em.position);
    earthState.atmoMat.uniforms.earthRadius.value = em.scale.x;
    // Clouds drift slowly relative to the surface.
    earthState.clouds.rotation.y = (spinSeconds / DAY) * Math.PI * 2 * 0.10;
  }

  // Moons: orbit their planet (compressed distance), tidally locked, sun-lit so
  // they show phases. Position/scale relative to the parent's current visual radius.
  for (const mn of moons){
    const pm = meshes[mn.parentIdx];
    const pr = pm.scale.x;                                   // parent visual radius
    const dist = mn.def.orbit * pr;
    const ang  = (simSeconds / (mn.def.per * DAY)) * Math.PI * 2;   // − period → retrograde
    mn._offset.set(Math.cos(ang) * dist, 0, Math.sin(ang) * dist).applyAxisAngle(MOON_X, mn.incl);
    mn.mesh.position.copy(pm.position).add(mn._offset);
    mn.mesh.scale.setScalar(mn.def.rr * pr);
    mn.mesh.lookAt(pm.position);                             // tidal lock
    mn.sunDir.copy(meshes[0].position).sub(mn.mesh.position).normalize();
    if (mn.atmoMat){
      mn.atmoMat.uniforms.camPos.value.copy(camera.position);
      mn.atmoMat.uniforms.bodyCenter.value.copy(mn.mesh.position);
      mn.atmoMat.uniforms.bodyRadius.value = mn.mesh.scale.x;
    }
    mn.ring.position.copy(pm.position);
    mn.ring.scale.setScalar(dist);
  }

  // Spacecraft traffic — spawn on a real-time timer and advance each craft's
  // lifecycle. Anchored to Earth (and the Moon for landings); frozen while paused.
  if (!paused){
    const eM = meshes[earthState.index];
    const earthPos = eM.position, earthR = eM.scale.x;
    const moonPos = earthMoon ? earthMoon.mesh.position : earthPos;
    const moonR   = earthMoon ? earthMoon.mesh.scale.x : earthR;
    if (trafficIdx > 0){
      trafficTimer -= dtReal;
      if (trafficTimer <= 0){
        if (craft.length < MAX_CRAFT) spawnCraft();
        trafficTimer = TRAFFIC_INTERVALS[trafficIdx] * (0.5 + Math.random());
      }
    }
    updateCraft(dtReal, earthPos, earthR, moonPos, moonR);
  }

  // Saturn: 26.7° axial tilt + spin, and feed the ring shader the Sun direction,
  // planet centre and (equatorial) radius for the cast-shadow computation.
  {
    const ss = saturnState;
    const sm = ss.mesh;
    const spin = (spinSeconds / ss.spinPeriod) * Math.PI * 2;
    ss.spinQuat.setFromAxisAngle(ss.spinAxis, spin);
    sm.quaternion.copy(ss.tiltQuat).multiply(ss.spinQuat);
    ss.sunDir.copy(meshes[0].position).sub(sm.position).normalize();  // shared with ring
    ss.ringUniforms.planetCenter.value.copy(sm.position);
    ss.ringUniforms.planetRadius.value = sm.scale.x;     // equatorial radius (world)
  }

  // Mercury / Venus / Mars / Jupiter / Uranus / Neptune: axial tilt + spin and
  // per-planet Sun direction for the shared sun-lit shader.
  for (const p of extraPlanets){
    const spin = (spinSeconds / p.spinPeriod) * Math.PI * 2;
    p.spinQuat.setFromAxisAngle(p.spinAxis, spin);
    p.mesh.quaternion.copy(p.tiltQuat).multiply(p.spinQuat);
    p.sunDir.copy(meshes[0].position).sub(p.mesh.position).normalize();
  }

  // Thin limb halo only — real space has no visible aura around the Sun.
  // Just a hint of chromospheric glow at 1.25× the disk radius.
  const sunR_world = (scaleMode === 'real')
    ? Math.min(bodies[0].R * SCENE_SCALE * sizeExaggeration, SUN_CAP_AU)
    : SUN_VISUAL_R;
  if (sunGlow.sprite){
    const glowSize = sunR_world * 1.25;
    sunGlow.sprite.scale.set(glowSize, glowSize, 1);
    sunGlow.sprite.position.copy(meshes[0].position);
    sunGlow.sprite.material.opacity = 0.45;
  }

  // Flares: each one is a Group containing 2–4 TubeGeometry arcs (magnetic
  // loops). Random spawn location + random birth time + impulsive rise → peak
  // → exponential decay. When a flare dies, its geometry is rebuilt with new
  // random shape and dropped at a new random spot on the surface.
  const tReal = now * 0.001;
  const sunPos = meshes[0].position;
  const camToSun = camera.position.clone().sub(sunPos).normalize();
  const FLARE_UP = new THREE.Vector3(0, 1, 0);

  for (let k = 0; k < flares.length; k++){
    const fl = flares[k];
    const ud = fl.userData;

    // (Re)spawn: pick new random location & rebuild strand geometry.
    if (ud.birthTime === undefined || (tReal - ud.birthTime) > ud.lifetime){
      ud.theta     = Math.random() * Math.PI * 2;
      ud.phi       = Math.asin(2 * Math.random() - 1);     // uniform on sphere
      const firstSpawn = (ud.birthTime === undefined);
      ud.birthTime = tReal + (firstSpawn ? Math.random() * 30 - 10 : Math.random() * 5);
      ud.lifetime  = 8 + Math.random() * 24;                // 8–32 s
      ud.peakBright = 0.65 + Math.random() * 0.45;          // per-flare brightness
      rebuildFlare(fl);

      // Cache the surface direction as a Vector3 + quaternion that orients
      // the strand's local +Y axis (surface-outward) to that direction.
      const cp = Math.cos(ud.phi), spy = Math.sin(ud.phi);
      ud.dir = new THREE.Vector3(
        cp * Math.cos(ud.theta),
        spy,
        cp * Math.sin(ud.theta),
      );
      ud.quat = new THREE.Quaternion().setFromUnitVectors(FLARE_UP, ud.dir);
      // Random roll around the surface normal so loops don't all face the same way.
      const rollQ = new THREE.Quaternion().setFromAxisAngle(ud.dir, Math.random() * Math.PI * 2);
      ud.quat.premultiply(rollQ);
    }

    const age = tReal - ud.birthTime;
    if (age < 0){ fl.group.visible = false; continue; }     // pre-birth (staggered)

    // Lifecycle envelope: fast rise, brief peak, exponential decay.
    const u = age / ud.lifetime;
    let env;
    if (u < 0.12)      env = u / 0.12;
    else if (u < 0.25) env = 1.0;
    else               env = Math.exp(-(u - 0.25) * 4.5);

    // Limb culling: only show flares near the silhouette (real surface
    // activity is the shader's job, not extra geometry on the disk).
    const facing = ud.dir.dot(camToSun);
    const absF = Math.abs(facing);
    if (absF > 0.6){ fl.group.visible = false; continue; }
    fl.group.visible = true;
    const ft = Math.min(1, Math.max(0, (0.6 - absF) / 0.30));
    const limbFade = ft * ft * (3 - 2 * ft);

    // Place + orient + scale the whole flare group.
    fl.group.position.copy(sunPos);
    fl.group.quaternion.copy(ud.quat);
    fl.group.scale.setScalar(sunR_world);

    // Per-strand opacity + point size. Size is set in world units relative to
    // the Sun's current radius, so flares scale correctly with zoom (perspective
    // attenuation) AND with the size-exaggeration setting — no more giant flares
    // when zoomed out.
    const opacity = 0.34 * env * limbFade * ud.peakBright;
    for (const s of fl.strands){
      s.material.opacity = opacity;
      s.material.size = sunR_world * s.userData.sizeF;
    }
  }

  // Camera focus / follow.
  const focusPos = focusTarget.mesh.position;
  if (followCam && followTarget === focusTarget){
    // Lock the viewer into the orbit's co-rotating frame, anchored at the
    // trajectory CENTRE (Sun for planets, parent planet for moons). Each frame we
    // measure how far the radial vector centre→body swept and revolve the WHOLE
    // camera frame (position about the centre + up vector) by that same rotation.
    // Using the radial vector — not the velocity tangent — makes it correct for
    // eccentric orbits, where the tangent turns non-uniformly but the radial
    // vector tracks the true revolution. The viewer therefore keeps a fixed
    // position relative to {centre, body, body+¼-rev}. A mouse drag is captured
    // (we re-read the camera each frame) and then carried along, so it re-locks.
    const cm = focusTarget.centerMesh;
    if (cm){
      const C = cm.position;
      const curRad = _fv0.copy(focusPos).sub(C);
      const rLen = curRad.length();
      if (rLen > 1e-9){
        curRad.multiplyScalar(1 / rLen);
        if (followPrevDir){
          _fq.setFromUnitVectors(followPrevDir, curRad);
          // Translate with the (moving) centre, then revolve about it.
          _fv1.copy(camera.position).sub(followPrevCenter).applyQuaternion(_fq);
          camera.position.copy(C).add(_fv1);
          camera.up.applyQuaternion(_fq).normalize();
        } else {
          followPrevDir = new THREE.Vector3();
        }
        followPrevDir.copy(curRad);
      }
      followPrevCenter.copy(C);
    } else {
      // No orbit centre (Sun / galaxy): just rigid-translate with the body.
      if (followPrevDir) camera.position.add(_fv1.copy(focusPos).sub(followPrev));
      else followPrevDir = new THREE.Vector3();
    }
    controls.target.copy(focusPos);
  } else {
    // Not following: ease the target onto the body but leave the camera put.
    controls.target.lerp(focusPos, 0.15);
    followPrevDir = null;            // re-arm so a freshly-followed body doesn't jump
  }
  followTarget = focusTarget;
  followPrev.copy(focusPos);

  // Adaptive zoom: scale the dolly step to how many "object radii" away we are,
  // so it's fine near the focused body and fast out in the (vast, mostly empty)
  // space between scales — essential now that the galaxy is ~10⁹× the planets.
  {
    const refR = focusTarget.mesh.scale.x || 1;
    const ratio = camera.position.distanceTo(controls.target) / refR;
    controls.zoomSpeed = Math.min(12, Math.max(0.4, Math.log10(ratio + 1) * 1.7));
  }

  // Adaptive near plane: bodies are tiny in real-ratio mode, so a fixed near plane
  // is easily larger than the camera-to-surface gap — zoom in and the plane slices
  // through (or past) the body and it vanishes. Keep the near plane at a fraction
  // of the gap to the focused body's surface so it never clips, while staying as
  // large as possible for depth precision. Grows back as you zoom out.
  {
    const d   = camera.position.distanceTo(controls.target);
    const r   = focusTarget.mesh.scale.x || 1;
    const gap = d - r;                                   // camera → near surface
    const near = gap > 0 ? Math.max(1e-6, gap * 0.5) : 1e-6;
    if (Math.abs(near - camera.near) > near * 0.05){
      camera.near = near;
      camera.updateProjectionMatrix();
    }
  }

  // Galaxy density fade: from inside the solar system the local star density is
  // low, so the Milky Way should read as a faint band and space stays dark. Only
  // as the camera pulls out toward galactic distances does the full glowing disk
  // resolve. Ramp on log10(distance from the Sun): ~1e6 AU (faint) → ~1e9 AU (full).
  {
    const camD = camera.position.length();
    const f = THREE.MathUtils.smoothstep(Math.log10(camD + 1), 6, 9);
    // Below the ramp the galaxy contributes nothing meaningful, so stop drawing
    // it: the huge edge-on image plane otherwise flickers (black ↔ light blue) as
    // the camera's tiny vertical jitter flips the coplanar quad in and out of view.
    const showGal = f > 0.002;
    milkyWay.visible = showGal;
    milkyWay.userData.stars.visible = showGal;
    if (showGal){
      milkyWay.userData.starMat.opacity  = 0.03 + 0.47 * f;
      milkyWay.userData.planeMat.opacity = 0.06 + 0.94 * f;
    }
  }

  // HUD — Moon uses Earth's heliocentric distance/speed as a proxy (it travels
  // with Earth around the Sun) but its own real mass/radius. Galactic targets
  // ('custom') show pre-formatted facts instead of live sim values.
  const ft = focusTarget;
  elFocus.textContent = ft.name;
  elTS.textContent = daysPerSec.toFixed(daysPerSec<1?3:(daysPerSec<10?2:0)) + ' d / s';
  elT.textContent = (simSeconds/DAY).toFixed(1) + ' d  (' + (simSeconds/YEAR).toFixed(3) + ' yr)';
  if (ft.custom){
    elR.textContent = ft.info.r;
    elV.textContent = ft.info.v;
    document.getElementById('mass').textContent  = ft.info.mass;
    document.getElementById('radius').textContent = ft.info.radius;
    document.getElementById('volume').textContent = ft.info.vol;
  } else {
    const src  = ft.isMoon ? ft.refBody : ft.body;
    const r    = src.pos.length();
    const v    = src.vel.length();
    const mass = ft.isMoon ? ft.mass : ft.body.m;
    const R    = ft.isMoon ? ft.R    : ft.body.R;
    elR.textContent = (r/AU).toFixed(3) + ' AU  (' + fmtKm(r) + ')';
    elV.textContent = (v/1000).toFixed(2) + ' km/s';
    document.getElementById('mass').textContent  = mass.toExponential(3) + ' kg  (' + fmtMass(mass) + ')';
    document.getElementById('radius').textContent = fmtRadius(R);
    document.getElementById('volume').textContent = fmtVolume(R);
  }

  // Drive Sun shader animation (time in seconds — slow drift on the surface).
  sunUniforms.time.value = now * 0.001;

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
